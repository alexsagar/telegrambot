version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: ledger-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  bot:
    build: .
    container_name: ledger-bot
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017

volumes:
  mongo_data:
